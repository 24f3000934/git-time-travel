name: Daily Repository Update

permissions:
  contents: write

on:
  schedule:
    - cron: '17 17 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository by 24f3000934@ds.study.iitm.ac.in
        uses: actions/checkout@v4

      - name: Step by 24f3000934@ds.study.iitm.ac.in
        run: echo "Workflow triggered by 24f3000934@ds.study.iitm.ac.in"

      - name: Make daily change by 24f3000934@ds.study.iitm.ac.in
        run: |
          echo "Last updated on $(date) by 24f3000934@ds.study.iitm.ac.in" >> daily-log.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add daily-log.txt
          git commit -m "Automated daily update by 24f3000934@ds.study.iitm.ac.in" || echo "No changes by 24f3000934@ds.study.iitm.ac.in"
          git pull --rebase
          git push
