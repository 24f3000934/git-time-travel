name: Daily Repository Update - 24f3000934@ds.study.iitm.ac.in

permissions:
  contents: write

on:
  schedule:
    - cron: '17 17 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: echo "Last updated on $(date)" >> daily-log.txt

      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add daily-log.txt
          git commit -m "Automated daily update" || exit 0
          git pull --rebase
          git push
